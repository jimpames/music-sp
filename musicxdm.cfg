title Sim390 MUSIC/SP Demo
* Configuration file for Sim390 mainframe emulator - 1-vol MUSICX Demo system.
* (c) Copyright Dave Edwards, 2001 - 2006. All rights reserved.
* Sim390 emulates an ESA/390 mainframe computer.
* See http://musicm.mcgill.ca/sim390 or http://www.geocities.com/sim390
* Note: This is a reduced MUSIC/SP system - for demo distribution or starter.
*   Compared with a full system, some standard files and utilities are
*   missing from the MUSIC/SP Save Library.
* It is assumed that you have stored the Demo system files in directory
* sim390dm of drive C. Adjust the following statements if another
* location was used.
*
* The following defines the memory size for MUSIC/SP (can be increased):
memory 16M
console columns 80 rows 300
* Uncomment the following autoipl command to start MUSIC/SP automatically
* when Sim390 is started:
autoipl 201 blankcmd
* Server port for remote 3270 connection via Telnet: normal port is 23,
* but we set it to 623 for security reasons. You can change it.
* Set remote3270port 0 if you want to disable the TN3270 server:
remote3270port 623
list on
remote3270filter allow 127.0.0.1     // loopback addr (localhost)
remote3270filter allow 192.168.1.244     // host addr (localhost) - put your pc address here
tcp 9080 80                           // Bridges Web Browser to McGill HTTPD
tcp 9021 21                           // Bridges FTP client to McGill FTPD
list off
HOST = 192.168.1.244   // music sp can be reached here - make it the same as your pc address above
iodevice console 00F
iodevice reader 00C
* Card punch device is not supported yet:
iodevice punch 00D invalid
* Printer output file must be pre-allocated:
iodevice printer 00E c:\sim390dm\printout.txt append
*
* Disk devices can be defined on any device addresses allowed by
* the MUSIC/SP nucleus. The distributed Demo nucleus allows 201 to 206
* and 301 to 306. See MUSIC/SP file $gen:nucgen.job
* DASD FBA device for the MUSIC/SP volume MUSICX:
iodevice diskf512 201 c:\sim390dm\musicxd.vol
*
* Terminals can be defined on any device addresses allowed by the
* MUSIC/SP nucleus. The distributed Demo nucleus allows 0F0 thru 0FF.
* See MUSIC/SP file $gen:nucgen.job
* Local 3270 terminals (provided by Sim390 itself):
iodevice local3270 0F0
iodevice local3270 0F1
iodevice local3270 0F2
iodevice local3270 0F3
* The following are for connection via Telnet (TN3270) clients,
* e.g. Hummingbird's HostExplorer.  The Telnet server port # is set above.
iodevice remote3270 0F4
iodevice remote3270 0F5
iodevice remote3270 0F6
iodevice remote3270 0F7
